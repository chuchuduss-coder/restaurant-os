<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Restaurant Manager v3</title>

<link rel="stylesheet" href="style.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div id="loginPage">

<h2>Restaurant Manager</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>


<div id="app" style="display:none;">

<div id="sidebar">

<h3>Restaurant OS</h3>

<button id="menu_dashboard" onclick="showPage('dashboard')">Dashboard</button>
<button id="menu_pos" onclick="showPage('pos')">POS</button>
<button id="menu_expense" onclick="showPage('expense')">Expense</button>
<button id="menu_stock" onclick="showPage('stock')">Stock</button>
<button id="menu_analytics" onclick="showPage('analytics')">Analytics</button>
<button id="menu_kpi" onclick="showPage('kpi')">KPI</button>

<hr>

<button onclick="logout()">Logout</button>

</div>


<div id="main">

<div id="topbar">

<button onclick="changeDate(-1)">◀</button>
<span id="currentDate"></span>
<button onclick="changeDate(1)">▶</button>

<input type="date" id="calendarPicker" onchange="selectDate()">

<div id="kpiAlert"></div>

</div>


<div id="page_dashboard"></div>
<div id="page_pos" class="hidden"></div>
<div id="page_expense" class="hidden"></div>
<div id="page_stock" class="hidden"></div>
<div id="page_analytics" class="hidden"></div>
<div id="page_kpi" class="hidden"></div>

</div>

</div>


<script src="auth.js"></script>
<script src="database.js"></script>
<script src="utils.js"></script>
<script src="calendar.js"></script>
<script src="dashboard.js"></script>
<script src="pos.js"></script>
<script src="expense.js"></script>
<script src="stock.js"></script>
<script src="analytics.js"></script>
<script src="kpi.js"></script>
<script src="app.js"></script>

</body>
</html>
